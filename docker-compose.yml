version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gameitemeditor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: GameItemEditorDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: GameItemEditor.Api/Dockerfile
    container_name: gameitemeditor-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=gameitemeditor-postgres;Port=5432;Database=GameItemEditorDb;Username=postgres;Password=postgres
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data: